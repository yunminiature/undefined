name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack + Yarn 4.9.2
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          yarn --version
      - name: Install main deps
        run: YARN_ENABLE_IMMUTABLE_INSTALLS=0 yarn install --no-check-resolutions
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn test
